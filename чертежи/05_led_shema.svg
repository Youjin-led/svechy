<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1850mm" height="1350mm" viewBox="0 0 1850 1350">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
  </marker>
  <radialGradient id="chipRed" cx="50%" cy="45%" r="60%">
    <stop offset="0%" stop-color="#ffcc79"/>
    <stop offset="40%" stop-color="#aa1610"/>
    <stop offset="100%" stop-color="#260604"/>
  </radialGradient>
  <radialGradient id="chipBlack" cx="50%" cy="45%" r="60%">
    <stop offset="0%" stop-color="#ffd890"/>
    <stop offset="42%" stop-color="#111"/>
    <stop offset="100%" stop-color="#040403"/>
  </radialGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<style>
  .bg{fill:#ffffff}
  .frame{fill:none;stroke:#d58a25;stroke-width:5}
  .gold{fill:none;stroke:#d79b38;stroke-width:3}
  .thinGold{fill:none;stroke:#d79b38;stroke-width:1.4}
  .dim{fill:none;stroke:#555;stroke-width:1.2;marker-start:url(#arrow);marker-end:url(#arrow)}
  .guide{fill:none;stroke:#999;stroke-width:.8;stroke-dasharray:12 8}
  .label{font-family:Arial,sans-serif;font-size:24px;fill:#111}
  .small{font-family:Arial,sans-serif;font-size:16px;fill:#111}
  .tiny{font-family:Arial,sans-serif;font-size:12px;fill:#111}
  .card{fill:#c69043;stroke:#2b1708;stroke-width:2}
  .cardLine{fill:none;stroke:#2b1708;stroke-width:2}
  .mirror{fill:rgba(110,180,220,.15);stroke:#53a9df;stroke-width:2}
  .mdf{fill:rgba(205,143,58,.16);stroke:#8f5b14;stroke-width:2}
  .cut{fill:none;stroke:#111;stroke-width:1.4}
  .engrave{fill:none;stroke:#1266a8;stroke-width:1;stroke-dasharray:9 6}
  text{letter-spacing:0}
</style>
<rect class="bg" x="0" y="0" width="1850" height="1350"/>
<text class="label" x="32" y="42">05 Схема LED-подключения</text>

    <rect class="cut" x="80" y="80" width="1320.6" height="1147" rx="89.9"/>
    <rect class="gold" x="107.9" y="107.9" width="1264.8" height="1091.2" rx="69.44"/>
    <rect class="gold" x="197.8" y="185.4" width="1085" height="936.2" rx="57.04"/>
    <rect class="gold" x="362.1" y="321.8" width="756.4" height="644.8" rx="38.44"/>
    <text class="label" x="135.8" y="154.4">A внешний контур: ~7.6 м</text>
    <text class="label" x="241.2" y="231.9">B внутренний контур: ~6.1 м</text>
    <text class="label" x="414.8" y="371.4">C тоннель: ~4.5 м</text>
    <text class="label" x="135.8" y="1183.6">D вертикальные/декор-линии: 5–8 м. Итого LED: 23–28 м с запасом.</text>
    <rect x="1540" y="260" width="230" height="95" fill="none" stroke="#111"/><text class="label" x="1570" y="315">контроллер</text>
    <rect x="1540" y="405" width="230" height="95" fill="none" stroke="#111"/><text class="label" x="1570" y="460">БП 24V</text>
    <line class="dim" x1="1655" y1="355" x2="1655" y2="405"/>
    <text class="small" x="1450" y="560">Рекомендация: 24V, 2–3 зоны питания, запас мощности 25–30%.</text>
<rect x="1490" y="1240" width="330" height="82" fill="none" stroke="#111"/>
<text class="small" x="1508" y="1268">Casino mirror composition</text>
<text class="tiny" x="1508" y="1294">Габарит: 2130 x 1850 x 235 мм</text>
<text class="tiny" x="1508" y="1316">Чистая версия по референсу</text>
</svg>