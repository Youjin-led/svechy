<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baked Jellyfish Animation Viewer</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #020818;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: fixed;
      left: 16px;
      bottom: 14px;
      color: rgba(228, 244, 255, 0.78);
      font-size: 12px;
      letter-spacing: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="hud">GLB morph animation preview</div>
  <script type="module">
    import * as THREE from './node_modules/three/build/three.module.js';
    import { GLTFLoader } from './node_modules/three/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020818);

    const camera = new THREE.PerspectiveCamera(36, innerWidth / innerHeight, 0.01, 100);
    camera.position.set(0, 0.35, 8.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.06;
    document.body.appendChild(renderer.domElement);

    const group = new THREE.Group();
    scene.add(group);

    const key = new THREE.PointLight(0x62dcff, 12, 10);
    key.position.set(-2.4, 2.4, 3.2);
    scene.add(key);

    const rim = new THREE.PointLight(0xff3d95, 13, 9);
    rim.position.set(2.2, 0.4, 3.0);
    scene.add(rim);

    const soft = new THREE.HemisphereLight(0x9edcff, 0x120516, 1.8);
    scene.add(soft);

    const clock = new THREE.Clock();
    let mixer = null;
    let model = null;

    const loader = new GLTFLoader();
    loader.load(
      './output/attempts/sketchfab_geonodes_jellyfish_baked_v2/jellyfish_baked.glb',
      (gltf) => {
        model = gltf.scene;
        model.scale.setScalar(0.86);
        model.position.set(0, 2.22, 0);
        model.rotation.y = -0.18;
        group.add(model);

        model.traverse((node) => {
          if (!node.isMesh) return;
          node.frustumCulled = false;
          node.material = new THREE.MeshPhysicalMaterial({
            color: 0xf4a0ff,
            transparent: true,
            opacity: 0.58,
            roughness: 0.38,
            metalness: 0,
            transmission: 0.18,
            thickness: 0.6,
            emissive: new THREE.Color(0xff56d5),
            emissiveIntensity: 0.58,
            side: THREE.DoubleSide,
            depthWrite: false
          });
        });

        mixer = new THREE.AnimationMixer(model);
        gltf.animations.forEach((clip) => {
          const action = mixer.clipAction(clip);
          action.reset();
          action.setLoop(THREE.LoopRepeat);
          action.play();
        });
      },
      undefined,
      (error) => {
        document.querySelector('.hud').textContent = `Load error: ${error.message}`;
        console.error(error);
      }
    );

    function resize() {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    }
    addEventListener('resize', resize);

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      if (mixer) mixer.update(dt);
      const t = clock.elapsedTime;
      group.rotation.y = Math.sin(t * 0.28) * 0.18;
      group.rotation.x = Math.sin(t * 0.19) * 0.035;
      group.position.y = Math.sin(t * 0.7) * 0.08;
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
